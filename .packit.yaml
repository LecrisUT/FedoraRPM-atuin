srpm_build_deps:
  - rust2rpm
  - rust2rpm-helper

targets:
  - fedora-rawhide
  - epel9

jobs:
  - job: copr_build
    owner: lecris
    project: atuin
    <<: *trigger
  - job: tests
    <<: *trigger
